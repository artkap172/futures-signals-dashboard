<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOEX Futures Signals | Advanced Analytics</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
        .header { background: #161b22; border-bottom: 1px solid #30363d; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 1.5rem; color: #58a6ff; display: flex; align-items: center; gap: 10px; }
        .market-status { background: #21262d; padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.8rem; border: 1px solid #30363d; }
        .container { max-width: 1400px; margin: 1.5rem auto; padding: 0 1rem; }
        
        /* Heatmap Styling */
        .heatmap-section { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1rem; margin-bottom: 2rem; display: flex; gap: 1rem; overflow-x: auto; }
        .heatmap-item { min-width: 150px; padding: 10px; border-radius: 8px; background: #21262d; border: 1px solid #30363d; text-align: center; }
        .h-ticker { font-weight: bold; font-size: 0.9rem; }
        .h-change { font-size: 1.1rem; font-weight: 800; }
        .up { color: #3fb950; }
        .down { color: #f85149; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.5rem; position: relative; transition: border-color 0.2s; }
        .card:hover { border-color: #58a6ff; }
        
        .priority-tag { position: absolute; top: 12px; left: 12px; font-size: 0.6rem; font-weight: bold; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }
        .priority-HIGH { background: rgba(88, 166, 255, 0.15); color: #58a6ff; }
        .priority-MEDIUM { background: rgba(210, 153, 34, 0.15); color: #d29922; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 10px; margin-bottom: 1rem; }
        .ticker { font-size: 1.4rem; font-weight: 800; color: #f0f6fc; }
        .signal-badge { padding: 4px 12px; border-radius: 20px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; }
        .long { background: rgba(63, 185, 80, 0.15); color: #3fb950; border: 1px solid #238636; }
        .short { background: rgba(248, 81, 73, 0.15); color: #f85149; border: 1px solid #da3633; }
        
        .price { font-size: 2.4rem; font-weight: 700; font-family: 'SF Mono', monospace; margin: 0.5rem 0; }
        .mode-info { font-size: 0.75rem; color: #8b949e; background: #0d1117; padding: 4px 8px; border-radius: 4px; display: inline-block; margin-bottom: 1rem; }
        
        .params { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }
        .param-item { background: #21262d; padding: 0.7rem; border-radius: 8px; border: 1px solid #30363d; }
        .p-label { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; display: block; margin-bottom: 2px; }
        .p-value { font-size: 0.95rem; font-weight: 700; font-family: monospace; }
        
        .reasoning { background: #0d1117; padding: 0.8rem; border-radius: 8px; font-size: 0.85rem; margin-top: 1rem; border-left: 3px solid #30363d; }
        .footer { text-align: center; padding: 3rem; color: #8b949e; font-size: 0.8rem; border-top: 1px solid #30363d; margin-top: 3rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 MOEX Futures Radar v3.1</h1>
        <div id="market-mode" class="market-status">Ожидание...</div>
        <div class="update-time">
            <span style="color: #8b949e; font-size: 0.7rem;">ОБНОВЛЕНО:</span>
            <span id="lastUpdate" style="font-weight: bold; color: #58a6ff;">--:--</span>
        </div>
    </div>

    <div class="container">
        <!-- Heatmap -->
        <div id="heatmap" class="heatmap-section">
            <!-- Heatmap items injected here -->
        </div>

        <div id="signalsGrid" class="grid">
            <!-- Cards injected here -->
        </div>
    </div>

    <div class="footer">
        © 2026 Advanced Signals Dashboard. ATR-Dynamic Risk & Market Heatmap.
    </div>

    <script>
        async function updateDashboard() {
            try {
                const res = await fetch('signals.json?t=' + Date.now());
                const data = await res.json();
                
                document.getElementById('lastUpdate').textContent = data.last_update;
                const mMode = document.getElementById('market-mode');
                mMode.textContent = "SENTIMENT: " + data.market_sentiment;
                mMode.style.color = data.market_sentiment === 'BULLISH' ? '#3fb950' : '#f85149';

                // Render Heatmap
                const hSection = document.getElementById('heatmap');
                hSection.innerHTML = data.heatmap.map(h => `
                    <div class="heatmap-item">
                        <div class="h-ticker">${h.ticker}</div>
                        <div class="h-change ${h.change >= 0 ? 'up' : 'down'}">${h.change > 0 ? '+' : ''}${h.change}%</div>
                        <div style="font-size: 0.7rem; color: #8b949e;">${h.price}</div>
                    </div>
                `).join('');

                const grid = document.getElementById('signalsGrid');
                grid.innerHTML = '';

                data.signals.forEach(sig => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="priority-tag priority-${sig.priority}">${sig.priority} PRIORITY</div>
                        <div class="card-header">
                            <div>
                                <span class="ticker">${sig.ticker}</span>
                                <span class="name">${sig.name}</span>
                            </div>
                            <span class="signal-badge ${sig.signal.toLowerCase()}">${sig.signal}</span>
                        </div>
                        <div class="price">${sig.current_price.toLocaleString('ru-RU')}</div>
                        <div class="mode-info">Market Mode: ${sig.mode.replace('_', ' ')}</div>
                        
                        <div class="params">
                            <div class="param-item"><span class="p-label">Entry Range</span><span class="p-value">${sig.entry_range}</span></div>
                            <div class="param-item"><span class="p-label">Stop Loss</span><span class="p-value" style="color: #f85149">${sig.stop_loss}</span></div>
                            <div class="param-item"><span class="p-label">TP 1</span><span class="p-value" style="color: #3fb950">${sig.tp1}</span></div>
                            <div class="param-item"><span class="p-label">TP 2</span><span class="p-value" style="color: #3fb950">${sig.tp2}</span></div>
                        </div>
                        <div class="reasoning">${sig.reasoning}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (e) { console.error(e); }
        }
        updateDashboard();
        setInterval(updateDashboard, 30000);
    </script>
</body>
</html>
