<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MOEX PRO | Trading Signals</title><style>
:root{--bg:#0b0e14;--surf:#151921;--brd:#2d333b;--txt:#adbac7;--head:#cdd9e5;--blue:#539bf5;--green:#57ab5a;--red:#f47067;--yel:#c69026;--purple:#b583f4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
.header{background:var(--surf);border-bottom:1px solid var(--brd);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:1.3rem;font-weight:900;color:var(--head);letter-spacing:-0.02em}
.m-status{padding:6px 14px;border-radius:8px;font-size:0.75rem;font-weight:800;border:1px solid var(--brd)}
.container{max-width:1600px;margin:2rem auto;padding:0 1.5rem}
.ticker-bar{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem;margin-bottom:2.5rem}
.t-item{background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:1rem;transition:all 0.3s}
.t-item:hover{border-color:var(--blue);transform:translateY(-2px)}
.t-name{font-size:0.65rem;color:#768390;text-transform:uppercase;font-weight:700;letter-spacing:0.05em}
.t-ticker{font-size:0.8rem;color:var(--head);font-weight:800;margin:0.3rem 0}
.t-price{font-family:monospace;font-size:1.1rem;color:var(--head);font-weight:700;margin:0.3rem 0}
.t-signal{font-size:0.65rem;padding:3px 8px;border-radius:5px;font-weight:800;display:inline-block;margin-top:0.3rem}
.LONG{background:var(--green);color:#fff}
.SHORT{background:var(--red);color:#fff}
.HOLD{background:var(--brd);color:var(--txt)}
.t-rsi-bar{margin-top:0.5rem}
.t-rsi-label{font-size:0.55rem;color:#768390;margin-bottom:0.2rem}
.rsi-container{background:#1c2128;border-radius:5px;height:6px;overflow:hidden;position:relative}
.rsi-fill{height:100%;transition:all 0.5s}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:1.5rem}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:14px;padding:1.5rem;position:relative;transition:all 0.3s}
.card:hover{border-color:var(--blue);box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.badge-row{display:flex;justify-content:space-between;margin-bottom:1rem;align-items:center}
.p-tag{font-size:0.65rem;font-weight:900;padding:4px 10px;border-radius:6px;letter-spacing:0.03em}
.p-HIGH{background:rgba(83,155,245,0.15);color:var(--blue);border:1px solid var(--blue)}
.p-MEDIUM{background:rgba(181,131,244,0.15);color:var(--purple);border:1px solid var(--purple)}
.sig-val{font-size:0.75rem;font-weight:900;padding:5px 12px;border-radius:12px}
.symbol{font-size:1.5rem;font-weight:900;color:var(--head);letter-spacing:-0.02em}
.price-row{margin:1rem 0;font-size:2.2rem;font-weight:900;font-family:monospace;color:var(--head)}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:0.6rem;margin-top:1rem}
.stat-box{background:#1c2128;padding:0.8rem;border-radius:8px;border:1px solid var(--brd)}
.s-label{font-size:0.55rem;color:#768390;text-transform:uppercase;display:block;font-weight:700}
.s-value{font-size:0.95rem;font-weight:800;font-family:monospace;margin-top:0.2rem}
.reason{margin-top:1rem;padding:0.8rem;background:#0b0e14;border-radius:8px;font-size:0.75rem;color:#768390;border-left:3px solid var(--brd);line-height:1.4}
.indicators{margin-top:1rem;padding:0.8rem;background:#1c2128;border-radius:8px;font-size:0.7rem}
.ind-row{display:flex;justify-content:space-between;padding:0.3rem 0}
.ind-label{color:#768390;font-weight:700}
.ind-value{color:var(--head);font-family:monospace;font-weight:700}
.up{color:var(--green)}
.down{color:var(--red)}
.neutral{color:var(--yel)}
.empty-msg{grid-column:1/-1;text-align:center;padding:6rem 2rem;border:1px dashed var(--brd);border-radius:14px;color:#768390}
</style></head><body>
<header class="header">
  <div class="logo">📊 MOEX PRO v5.0</div>
  <div id="sent" class="m-status">SENTIMENT: --</div>
  <div>
    <div style="font-size:0.55rem;color:#768390;text-transform:uppercase;font-weight:700">UPDATE</div>
    <div id="time" style="font-weight:800;color:var(--blue);font-size:0.9rem">--:--</div>
  </div>
</header>
<div class="container">
  <div id="tickers" class="ticker-bar"></div>
  <div id="grid" class="grid">
    <div class="empty-msg">Loading...</div>
  </div>
</div>
<script>
function getRSIColor(rsi){
  if(!rsi) return '#768390';
  if(rsi<30) return '#57ab5a';
  if(rsi<40) return '#a5d6a7';
  if(rsi<60) return '#c69026';
  if(rsi<70) return '#ff9800';
  return '#f47067';
}
async function upd(){
try{
const r=await fetch('signals.json?t='+Date.now());
const d=await r.json();
document.getElementById('time').textContent=d.last_update;
const s=document.getElementById('sent');
const sent=d.market_sentiment||'NEUTRAL';
s.textContent=`SENTIMENT: ${sent}`;
if(sent==='BULLISH') s.style.color='#57ab5a';
else if(sent==='BEARISH') s.style.color='#f47067';
else s.style.color='#c69026';
const hm=d.heatmap||[];
document.getElementById('tickers').innerHTML=hm.map(h=>{
const rsi=h.rsi||null;
const rsiPct=rsi?rsi:50;
const rsiCol=getRSIColor(rsi);
const chg=h.change||0;
const sig=h.signal||'HOLD';
return `<div class="t-item">
  <div class="t-name">${h.name||h.ticker}</div>
  <div class="t-ticker">${h.ticker}</div>
  <div class="t-price">${h.price||'N/A'}</div>
  <div style="font-size:0.75rem;font-weight:800" class="${chg>=0?'up':'down'}">${chg>=0?'+':''}${chg}%</div>
  <div class="t-signal ${sig}">${sig}</div>
  ${rsi?`<div class="t-rsi-bar"><div class="t-rsi-label">RSI: ${rsi.toFixed(1)}</div><div class="rsi-container"><div class="rsi-fill" style="width:${rsiPct}%;background:${rsiCol}"></div></div></div>`:''}
</div>`;
}).join('');
const g=document.getElementById('grid');
const sigs=d.signals||[];
if(sigs.length===0){
g.innerHTML='<div class="empty-msg">No active signals. Monitoring...</div>';
}else{
g.innerHTML=sigs.map(sg=>{
const ind=sg.indicators||{};
return `<div class="card">
<div class="badge-row">
  <span class="p-tag p-${sg.priority}">${sg.priority}</span>
  <span class="sig-val ${sg.signal}">${sg.signal}</span>
</div>
<div>
  <div class="symbol">${sg.ticker}</div>
  <div style="font-size:0.75rem;color:#768390;font-weight:700">${sg.name}</div>
</div>
<div class="price-row">${sg.current_price}</div>
<div class="stats">
  <div class="stat-box"><span class="s-label">Entry Range</span><span class="s-value">${sg.entry_range}</span></div>
  <div class="stat-box"><span class="s-label">Stop Loss</span><span class="s-value" style="color:var(--red)">${sg.stop_loss||'N/A'}</span></div>
  <div class="stat-box"><span class="s-label">Target 1</span><span class="s-value" style="color:var(--green)">${sg.tp1||'N/A'}</span></div>
  <div class="stat-box"><span class="s-label">Target 2</span><span class="s-value" style="color:var(--green)">${sg.tp2||'N/A'}</span></div>
</div>
${ind&&Object.keys(ind).length>0?`<div class="indicators">
  ${ind.rsi?`<div class="ind-row"><span class="ind-label">RSI(14):</span><span class="ind-value" style="color:${getRSIColor(ind.rsi)}">${ind.rsi}</span></div>`:''}
  ${ind.ema50?`<div class="ind-row"><span class="ind-label">EMA50:</span><span class="ind-value">${ind.ema50}</span></div>`:''}
  ${ind.ema200?`<div class="ind-row"><span class="ind-label">EMA200:</span><span class="ind-value">${ind.ema200}</span></div>`:''}
  ${ind.macd&&ind.macd_signal?`<div class="ind-row"><span class="ind-label">MACD:</span><span class="ind-value" style="color:${ind.macd>ind.macd_signal?'#57ab5a':'#f47067'}">${ind.macd} / ${ind.macd_signal}</span></div>`:''}
  ${ind.bbl&&ind.bbu?`<div class="ind-row"><span class="ind-label">BB:</span><span class="ind-value">${ind.bbl} - ${ind.bbu}</span></div>`:''}
  ${ind.atr?`<div class="ind-row"><span class="ind-label">ATR:</span><span class="ind-value">${ind.atr}</span></div>`:''}
</div>`:''}
<div class="reason">${sg.reasoning}</div>
</div>`;
}).join('');
}
}catch(e){console.error(e);}
}
upd();setInterval(upd,30000);
</script>
</body></html>
