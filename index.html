<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>MOEX PRO | Trading Signals</title>
    <style>
        :root {
            --bg: #0b0e14; --surf: #151921; --brd: #2d333b; --txt: #adbac7; --head: #cdd9e5;
            --blue: #539bf5; --green: #57ab5a; --red: #f47067; --yel: #c69026; --purple: #b583f4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--txt); line-height: 1.5; overflow-x: hidden; }
        .header { background: var(--surf); border-bottom: 1px solid var(--brd); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .logo { font-size: 1.3rem; font-weight: 900; color: var(--head); letter-spacing: -0.02em; }
        .m-status { padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--brd); }
        .container { max-width: 1600px; margin: 2rem auto; padding: 0 1.5rem; }
        
        .ticker-bar { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 1rem; margin-bottom: 2.5rem; }
        .t-item { background: var(--surf); border: 1px solid var(--brd); border-radius: 10px; padding: 1rem; transition: all 0.3s; cursor: pointer; }
        .t-item:hover { border-color: var(--blue); transform: translateY(-2px); }
        .t-name { font-size: 0.65rem; color: #768390; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
        .t-ticker { font-size: 0.8rem; color: var(--head); font-weight: 800; margin: 0.2rem 0; }
        .t-price { font-family: monospace; font-size: 1.1rem; color: var(--head); font-weight: 700; }
        .t-signal { font-size: 0.65rem; padding: 3px 8px; border-radius: 5px; font-weight: 800; display: inline-block; margin-top: 0.5rem; }
        .LONG { background: var(--green); color: #fff; }
        .SHORT { background: var(--red); color: #fff; }
        .HOLD { background: var(--brd); color: var(--txt); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 1.5rem; }
        .card { background: var(--surf); border: 1px solid var(--brd); border-radius: 14px; padding: 1.5rem; position: relative; transition: all 0.3s; display: flex; flex-direction: column; }
        .card.active-sig { border-color: var(--blue); border-width: 2px; box-shadow: 0 8px 24px rgba(83, 155, 245, 0.2); }
        .badge-row { display: flex; justify-content: space-between; margin-bottom: 1rem; align-items: center; }
        .p-tag { font-size: 0.65rem; font-weight: 900; padding: 4px 10px; border-radius: 6px; }
        .p-HIGH { background: rgba(83, 155, 245, 0.15); color: var(--blue); border: 1px solid var(--blue); }
        .p-MEDIUM { background: rgba(181, 131, 244, 0.15); color: var(--purple); border: 1px solid var(--purple); }
        .sig-val { font-size: 0.75rem; font-weight: 900; padding: 5px 12px; border-radius: 12px; }
        
        .symbol { font-size: 1.5rem; font-weight: 900; color: var(--head); }
        .price-row { margin: 0.5rem 0; font-size: 2rem; font-weight: 900; font-family: monospace; color: var(--head); }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; margin: 1rem 0; }
        .stat-box { background: #1c2128; padding: 0.7rem; border-radius: 8px; border: 1px solid var(--brd); }
        .s-label { font-size: 0.55rem; color: #768390; text-transform: uppercase; font-weight: 700; display: block; }
        .s-value { font-size: 0.9rem; font-weight: 800; font-family: monospace; margin-top: 0.2rem; }
        
        .indicators { background: #1c2128; padding: 0.8rem; border-radius: 8px; margin-top: auto; font-size: 0.7rem; }
        .ind-row { display: flex; justify-content: space-between; padding: 0.2rem 0; }
        .ind-label { color: #768390; font-weight: 600; }
        .ind-value { color: var(--head); font-family: monospace; font-weight: 700; }
        
        .up { color: var(--green); }
        .down { color: var(--red); }
        .empty-msg { grid-column: 1/-1; text-align: center; padding: 6rem; color: #768390; border: 1px dashed var(--brd); border-radius: 14px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">📊 MOEX PRO v5.1</div>
        <div id="sent" class="m-status">SENTIMENT: --</div>
        <div style="text-align: right">
            <div style="font-size: 0.55rem; color: #768390; font-weight: 700">LAST UPDATE</div>
            <div id="time" style="font-weight: 800; color: var(--blue); font-size: 0.9rem">--:--</div>
        </div>
    </header>

    <div class="container">
        <div id="tickers" class="ticker-bar"></div>
        <h2 style="margin-bottom: 1.5rem; font-size: 1.1rem; color: var(--head)">Monitoring & Signals</h2>
        <div id="grid" class="grid">
            <div class="empty-msg">Loading data...</div>
        </div>
    </div>

    <script>
        function getRSIColor(rsi) {
            if (!rsi) return '#768390';
            if (rsi < 30) return '#57ab5a';
            if (rsi < 40) return '#a5d6a7';
            if (rsi > 70) return '#f47067';
            if (rsi > 60) return '#ffab91';
            return '#c69026';
        }

        async function upd() {
            try {
                const r = await fetch('signals.json?t=' + Date.now());
                const d = await r.json();
                
                document.getElementById('time').textContent = d.last_update;
                const s = document.getElementById('sent');
                const sent = d.market_sentiment || 'NEUTRAL';
                s.textContent = `SENTIMENT: ${sent}`;
                s.style.color = sent === 'BULLISH' ? '#57ab5a' : (sent === 'BEARISH' ? '#f47067' : '#c69026');
                
                // Render Top Bar
                const hm = d.heatmap || [];
                document.getElementById('tickers').innerHTML = hm.map(h => {
                    const sig = h.signal || 'HOLD';
                    const chg = h.change || 0;
                    return `
                        <div class="t-item" onclick="document.getElementById('card-${h.ticker}').scrollIntoView({behavior:'smooth'})">
                            <div class="t-name">${h.name}</div>
                            <div class="t-ticker">${h.ticker}</div>
                            <div class="t-price">${h.price || 'N/A'}</div>
                            <div style="font-size:0.75rem;font-weight:800" class="${chg >= 0 ? 'up' : 'down'}">
                                ${chg >= 0 ? '+' : ''}${chg}%
                            </div>
                            <div class="t-signal ${sig}">${sig}</div>
                        </div>
                    `;
                }).join('');
                
                // Render Grid (All Assets)
                const all = d.all_assets || [];
                const g = document.getElementById('grid');
                if (all.length === 0) {
                    g.innerHTML = '<div class="empty-msg">No data available. Market might be closed.</div>';
                } else {
                    g.innerHTML = all.map(sg => {
                        const ind = sg.indicators || {};
                        const active = sg.signal !== 'HOLD' ? 'active-sig' : '';
                        return `
                            <div class="card ${active}" id="card-${sg.ticker}">
                                <div class="badge-row">
                                    <span class="p-tag p-${sg.priority}">${sg.priority}</span>
                                    <span class="sig-val ${sg.signal}">${sg.signal}</span>
                                </div>
                                <div>
                                    <div class="symbol">${sg.ticker}</div>
                                    <div style="font-size:0.75rem;color:#768390;font-weight:700">${sg.name}</div>
                                </div>
                                <div class="price-row">${sg.current_price || '---'}</div>
                                <div class="stats">
                                    <div class="stat-box"><span class="s-label">Entry</span><span class="s-value">${sg.entry_range || '---'}</span></div>
                                    <div class="stat-box"><span class="s-label">Stop Loss</span><span class="s-value" style="color:var(--red)">${sg.stop_loss || '---'}</span></div>
                                    <div class="stat-box"><span class="s-label">Target 1</span><span class="s-value" style="color:var(--green)">${sg.tp1 || '---'}</span></div>
                                    <div class="stat-box"><span class="s-label">Target 2</span><span class="s-value" style="color:var(--green)">${sg.tp2 || '---'}</span></div>
                                </div>
                                <div class="indicators">
                                    <div class="ind-row">
                                        <span class="ind-label">RSI(14):</span>
                                        <span class="ind-value" style="color:${getRSIColor(ind.rsi)}">${ind.rsi || '--'}</span>
                                    </div>
                                    <div class="ind-row">
                                        <span class="ind-label">EMA 50/200:</span>
                                        <span class="ind-value">${ind.ema50 || '--'} / ${ind.ema200 || '--'}</span>
                                    </div>
                                    <div class="ind-row">
                                        <span class="ind-label">MACD:</span>
                                        <span class="ind-value" style="color:${ind.macd > ind.macd_signal ? '#57ab5a' : '#f47067'}">
                                            ${ind.macd || '--'} / ${ind.macd_signal || '--'}
                                        </span>
                                    </div>
                                    <div class="ind-row">
                                        <span class="ind-label">Trend:</span>
                                        <span class="ind-value" style="color:${sg.mode === 'BULLISH' ? '#57ab5a' : (sg.mode === 'BEARISH' ? '#f47067' : '#c69026')}">
                                            ${sg.mode}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                console.error("Update error:", e);
                document.getElementById('grid').innerHTML = '<div class="empty-msg">Error loading signals.json. Check GitHub Actions.</div>';
            }
        }
        
        upd();
        setInterval(upd, 60000);
    </script>
</body>
</html>
