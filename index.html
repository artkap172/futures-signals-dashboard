<!DOCTYPE html><html lang="ru"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MOEX PRO | Trading Signals</title><style>
:root{--bg:#0b0e14;--surf:#151921;--brd:#2d333b;--txt:#adbac7;--head:#cdd9e5;--blue:#539bf5;--green:#57ab5a;--red:#f47067;--yel:#c69026}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:var(--bg);color:var(--txt);line-height:1.5}
.header{background:var(--surf);border-bottom:1px solid var(--brd);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo{font-size:1.2rem;font-weight:800;color:var(--head)}
.m-status{padding:4px 12px;border-radius:6px;font-size:0.7rem;border:1px solid var(--brd);font-weight:700}
.container{max-width:1400px;margin:1.5rem auto;padding:0 1rem}
.ticker-bar{display:flex;gap:1rem;overflow-x:auto;padding-bottom:1rem;margin-bottom:2rem}
.t-item{background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:0.75rem 1rem;min-width:140px;text-align:center}
.t-name{font-size:0.6rem;color:#768390;text-transform:uppercase}
.t-price{font-family:monospace;font-size:1rem;color:var(--head)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:1.5rem}
.card{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:1.5rem;position:relative}
.badge-row{display:flex;justify-content:space-between;margin-bottom:1rem}
.p-tag{font-size:0.6rem;font-weight:800;padding:2px 8px;border-radius:4px}
.p-HIGH{background:rgba(83,155,245,0.1);color:var(--blue);border:1px solid var(--blue)}
.sig-val{font-size:0.7rem;font-weight:800;padding:2px 10px;border-radius:10px}
.LONG{background:var(--green);color:#fff}.SHORT{background:var(--red);color:#fff}
.symbol{font-size:1.4rem;font-weight:800;color:var(--head)}
.price-row{margin:1rem 0;font-size:2rem;font-weight:700;font-family:monospace}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem}
.stat-box{background:#1c2128;padding:0.75rem;border-radius:8px;border:1px solid var(--brd)}
.s-label{font-size:0.55rem;color:#768390;text-transform:uppercase;display:block}
.s-value{font-size:0.9rem;font-weight:700;font-family:monospace}
.reason{margin-top:1rem;padding:0.75rem;background:#0b0e14;border-radius:6px;font-size:0.75rem;color:#768390;border-left:3px solid var(--brd)}
.up{color:var(--green)}.down{color:var(--red)}
</style></head><body>
<header class="header">
<div class="logo">📊 MOEX PRO v5.0</div>
<div id="sent" class="m-status">SENTIMENT: --</div>
<div><div style="font-size:0.5rem;color:#768390">UPDATE</div><div id="time" style="font-weight:800;color:var(--blue)">--:--</div></div>
</header>
<div class="container">
<div id="tickers" class="ticker-bar"></div>
<div id="grid" class="grid"><div style="text-align:center;width:100%;grid-column:1/-1;padding:5rem">Loading...</div></div>
</div>
<script>
async function upd(){
try{
const r=await fetch('signals.json?t='+Date.now());
const d=await r.json();
document.getElementById('time').textContent=d.last_update;
const s=document.getElementById('sent');
s.textContent="SENTIMENT: "+d.market_sentiment;
s.style.color=d.market_sentiment==='BULLISH'? '#57ab5a':'#f47067';
document.getElementById('tickers').innerHTML=d.heatmap.map(h=>`
<div class="t-item"><div class="t-name">${h.ticker}</div><div class="t-price">${h.price}</div><div style="font-size:0.7rem" class="${h.change>=0?'up':'down'}">${h.change}%</div></div>
`).join('');
const g=document.getElementById('grid');
if(!d.signals||d.signals.length===0){
g.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:5rem;border:1px dashed var(--brd);border-radius:12px">No active signals. Monitoring...</div>';
}else{
g.innerHTML=d.signals.map(s=>`
<div class="card">
<div class="badge-row"><span class="p-tag p-${s.priority}">${s.priority}</span><span class="sig-val ${s.signal}">${s.signal}</span></div>
<div><div class="symbol">${s.ticker}</div><div style="font-size:0.7rem;color:#768390">${s.name}</div></div>
<div class="price-row">${s.current_price}</div>
<div class="stats">
<div class="stat-box"><span class="s-label">Entry</span><span class="s-value">${s.entry_range}</span></div>
<div class="stat-box"><span class="s-label">Stop Loss</span><span class="s-value" style="color:var(--red)">${s.stop_loss}</span></div>
<div class="stat-box"><span class="s-label">Target 1</span><span class="s-value" style="color:var(--green)">${s.tp1}</span></div>
<div class="stat-box"><span class="s-label">Target 2</span><span class="s-value" style="color:var(--green)">${s.tp2}</span></div>
</div>
<div class="reason">${s.reasoning}</div>
</div>`).join('');
}}catch(e){console.error(e)}}
upd();setInterval(upd,30000);
</script></body></html>
